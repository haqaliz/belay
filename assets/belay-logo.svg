<svg width="120" height="104" viewBox="0 0 220 190" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Belay">
  <!-- Belay mark: a lowercase "b" whose bowl continues into a figure-eight / infinity
       loop, drawn as one continuous strand of climbing rope that crosses over itself at
       the center. The orange crossing is the "belay knot" where the rope holds. -->
  <g fill="none" stroke="#C89B6C" stroke-width="20" stroke-linecap="round" stroke-linejoin="round">
    <!-- the figure-eight: one self-crossing strand (left loop + right loop) -->
    <path d="M108 118
             C 88 74, 28 74, 28 118
             C 28 162, 88 162, 108 118
             C 128 74, 188 74, 188 118
             C 188 162, 128 162, 108 118 Z" />
    <!-- stem: the ascender of the b, merging into the upper-left of the left loop -->
    <path d="M48 32 C 45 56, 42 74, 42 90" />
  </g>
  <!-- the knot: the crossing strand, drawn on top so the rope clearly passes over itself -->
  <path d="M90 150 C 98 138, 118 100, 126 88" fill="none" stroke="#F26417" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" />
</svg>
