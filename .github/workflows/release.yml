name: Release

on:
  push:
    tags: ["v*"]

# Default to read-only; each job requests exactly the write scope it needs.
permissions:
  contents: read

jobs:
  build:
    name: build wheel + sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build wheel and sdist
        run: uv build

      - name: Verify the tag matches the package version
        env:
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")"
          if [ "$TAG" != "v$VERSION" ]; then
            echo "::error::tag $TAG does not match pyproject version v$VERSION"
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  pypi:
    name: publish to PyPI (belay-harness)
    needs: build
    runs-on: ubuntu-latest
    # Runs in the `pypi` environment; trusted publishing needs the OIDC token, no stored secret.
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Extract this version's changelog section
        env:
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          awk -v v="## [$VERSION]" '
            index($0, v) == 1 { inseg = 1; next }
            inseg && /^## \[/ { exit }
            inseg { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "See CHANGELOG.md for details." > RELEASE_NOTES.md
          fi

      - name: Create the release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          gh release create "$TAG" dist/* \
            --repo "$REPO" \
            --title "$TAG" \
            --notes-file RELEASE_NOTES.md
